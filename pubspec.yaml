name: pillow
description: "A new Flutter project."
publish_to: 'none'

version: 1.9.3+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  path: ^1.9.0
  url_launcher: ^6.3.0
  flutter_dotenv: ^5.1.0
  http: ^1.2.2
  logger: ^2.7.0
  awesome_dialog: ^3.3.0
  delightful_toast: ^1.1.0
  lucide_icons: ^0.257.0
  on_audio_query: ^2.9.0
  just_audio: ^0.10.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  audio_service: ^0.18.18

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

# The following section is specific to Flutter packages.
flutter:

  uses-material-design: true
  assets:
    - assets/
    - .env


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/pillow.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/pillow.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
