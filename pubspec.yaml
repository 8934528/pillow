name: pillow
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  audioplayers: ^6.0.0
  path: ^1.9.0
  url_launcher: ^6.3.0
  flutter_dotenv: ^5.1.0
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

# The following section is specific to Flutter packages.
flutter:

  uses-material-design: true
  assets:
    - assets/
    - .env


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/pillow.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/pillow.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
